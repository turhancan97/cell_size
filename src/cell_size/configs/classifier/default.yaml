crop_size: 224
crop_padding_pct: 0.2
crop_format: "jpg"           # png | jpg
mask_background: false       # zero out pixels outside cell mask
crops_dir: "crops"           # output directory for extracted crops

split_ratio: [0.70, 0.15, 0.15]
seed: 42 # 8 | 42 | 100

encoder: "resnet18"          # resnet18 | resnet50 | vit_b_16 | efficientnet_b0 | squeezenet1_1 | timm/<model_name> (e.g. timm/vit_small_patch16_dinov3.lvd1689m)
freeze_encoder: false
pretrained: true
train_with_val: true        # if true: train on train+val and monitor/select checkpoint on test (final-fit mode)
use_mlp_head: false           # if true: Linear(in,128)->ReLU->Linear(128,32)->ReLU->Linear(32,8)->ReLU->Linear(8,1)
use_efficient_probing: false # timm ViT only; mutually exclusive with use_mlp_head
efficient_probing:
  num_queries: 4
  num_heads: 1
  d_out: 1
  qkv_bias: false
  qk_scale: null

epochs: 100
batch_size: 64
learning_rate: 0.0001
weight_decay: 0.00001
early_stopping_patience: 25

confidence_threshold: 0.7    # cells below this -> flagged for review
gpu: true

wandb:
  enabled: false
  project: "cell-quality"
  run_name: null
  n_samples: 16            # sample images logged to WandB per epoch (half good, half bad)

cross_validation:
  enabled: false
  k_folds: 5
